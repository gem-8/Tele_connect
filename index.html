<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tele-Connect Specialist Portal</title>
        <link href="https:fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="app-container">
            <header class="app-header">
                <h1>Welcome, Dr. Ende</h1>
            </header>
            <section class="metrics-container">
                <div class="metric-card">
                <div class="metric-icon">
                    <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 16 14"/></svg>
                </div>
                <span class="metric-label">Pending Referrals</span>
                <span class="metric-value">4</span>
            </div>
            <div class="metric-card">
                <div class="metric-icon">
                    <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/><path d="M12 7v10"/><path d="M7 12h10"/></svg>
                </div>
                <span class="metric-label">Consultations</span>
                <span class="metric value" style="font-size: 1.6rem !important; font-weight: 700 !important; font-family: sans-serif !important; color: #000000 !important; display: block !important;">12</span>
            </div>
            <div class="metric-card">
                <div class="metric-icon urgent">
                    <svg viewbox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                </div>
                <span class="metric-label">Emergency Alerts</span>
                <span class="metric-value">0</span>
            </div>
            </section>
            <main class="app-content">
                <button class="btn-primary-action">+New Specialist Referral</button>
                <section class="activity-section">
                    <h2>Recent Activity</h2>
                    <div class="activity-list">
                        <div class="activity-item">
                            <div class="patient meta">
                                <span class="status-dot"></span>
                                <span class="patient-name">Miss Evelyn Agashua</span>
                        </div>
                        <button class="btn-record">View Records</button>
                    </div>
                    <div class="activity-item">
                         <div class="patient-meta">
                            <span class="status-dot"></span>
                            <span class="patient-name">Mr. Terdoo Philip</span>
                            </div>
                         <button class="btn-record">View Records</button>
                    </div>
                    <div class="activity-item">
                        <div class="patient-meta">
                            <span class="status-dot"></span>
                            <span class="patient-name">Prof. Timothy Shir</span>
                        </div>
                        <button class="btn-record">View Records</button>
                    </div>
                    </div>
                </section>
            </main>
        </div>
    </body>
</html>
